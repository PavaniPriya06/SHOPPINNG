services:
  - type: web
    name: tcs-clothing-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: ADMIN_EMAIL
        value: admin@tcs.com
      - key: ADMIN_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false  # Set to your Vercel frontend URL
      - key: MERCHANT_UPI_ID
        value: 9391800473@axl
      - key: MERCHANT_NAME
        value: TCS Store
